<<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SoundWave | Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <div class="container mt-5">
       <header class="text-center mb-5">
          <h1>SOUNDWAVE</h1>
          <p class="text-secondary">Tu música, tus reglas.</p>
          <button id="btn-cargar" class="btn btn-spotify mt-3">
              VER CANCIONES
          </button>
       </header>
 
       <div id="contenedor-tabla" class="card-custom" style="display: none;">
          <table class="table table-hover">
              <thead>
                  <tr>
                      <th>Canción</th>
                      <th>Duración</th>
                      <th>Artista</th>
                      <th>Género</th>
                  </tr>
              </thead>
              <tbody id="tabla-body">
              </tbody>
          </table>
 
          <div class="d-flex justify-content-between align-items-center mt-4">
              <button id="btn-anterior" class="btn btn-outline-light" disabled>Anterior</button>
              <span id="indicador-pagina" class="fw-bold">Página 1</span>
              <button id="btn-siguiente" class="btn btn-outline-light">Siguiente</button>
          </div>
       </div>
    </div>
 
    <script>
        // Variables globales para controlar la página actual y el límite
        let paginaActual = 1;
        const limitePorPagina = 20;
 
        function DuracionEnMinutos(segundos) {
            const min = Math.floor(segundos / 60);
            const sec = segundos % 60;
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }
 
        async function fetchCatalogo(paginaAMostrar) {
            try {
                // NUEVO: Agregamos query params a la URL
                const response = await fetch(`http://localhost:3000/api/catalogo?page=${paginaAMostrar}&limit=${limitePorPagina}`);
                const datos = await response.json();
 
                const tbody = document.getElementById('tabla-body');
                tbody.innerHTML = '';
 
                datos.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="titulo-cancion">${item.titulo}</td>
                            <td class="text-duration">${DuracionEnMinutos(item.duracion_segundos)}</td>
                            <td>${item.artista}</td>
                            <td><span class="badge bg-dark border border-success text-success">${item.genero}</span></td>
                        </tr>
                    `;
                });
 
                // Actualizamos la interfaz
                document.getElementById('contenedor-tabla').style.display = 'block';
                document.getElementById('btn-cargar').style.display = 'none';
 
                // Actualizamos el indicador de página
                paginaActual = paginaAMostrar;
                document.getElementById('indicador-pagina').innerText = `Página ${paginaActual}`;
 
                // NUEVO: Lógica para deshabilitar botones
                // Deshabilitar "Anterior" si estamos en la página 1
                document.getElementById('btn-anterior').disabled = (paginaActual === 1);
 
                // Deshabilitar "Siguiente" si nos trajo menos de 20 canciones (significa que es la última página)
                document.getElementById('btn-siguiente').disabled = (datos.length < limitePorPagina);
 
            } catch (error) {
                console.error("Error al cargar datos:", error);
                alert("No se pudo conectar con el servidor.");
            }
        }
 
        // LISTENERS DE LOS BOTONES
        document.getElementById('btn-cargar').addEventListener('click', () => {
            fetchCatalogo(1); // Arrancamos en la página 1
        });
 
        document.getElementById('btn-anterior').addEventListener('click', () => {
            if (paginaActual > 1) {
                fetchCatalogo(paginaActual - 1);
            }
        });
 
        document.getElementById('btn-siguiente').addEventListener('click', () => {
            fetchCatalogo(paginaActual + 1);
        });
    </script>
</body>
</html>
